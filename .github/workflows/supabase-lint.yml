name: Supabase Security Lint

# Blocks PRs / pushes to main when the Supabase linter reports any finding in
# the SECURITY category at level WARN or ERROR.
#
# Required repo secrets:
#   SUPABASE_ACCESS_TOKEN   (personal access token, https://supabase.com/dashboard/account/tokens)
#   SUPABASE_PROJECT_REF    (the project ref of the production backend)
#
# The job is a no-op if either secret is missing, so forks without access can
# still build.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Supabase security linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run linter and fail on SECURITY warnings
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: node scripts/lint-security-gate.mjs
