name: Android Release (Play Store)

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play track (internal | alpha | beta | production)"
        required: true
        default: "internal"
      release_status:
        description: "draft | inProgress | halted | completed"
        required: true
        default: "draft"
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: android-release
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build AAB + upload to Play
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      CAP_ENV: prod
      # versionCode = GitHub run number — monotonically increases forever
      BUILD_NUMBER: ${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Show version
        run: npm run version:read

      - name: Build web assets
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || echo "android platform already present"

      - name: Capacitor sync
        run: npx cap sync android

      - name: Bump Android versionCode/versionName
        run: npm run android:bump

      - name: Configure release signing + Firebase
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: npm run android:configure

      - name: Build signed AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload to Google Play
        if: ${{ env.HAVE_PLAY_KEY == 'true' }}
        env:
          HAVE_PLAY_KEY: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.missbamaslammer.cashstage
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: ${{ github.event.inputs.release_status || 'draft' }}
          mappingFile: android/app/build/outputs/mapping/release/mapping.txt
